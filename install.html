<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>讲话助手 - 安装引导</title>
<style>
body{margin:0;padding:20px;font-family:-apple-system,sans-serif;background:#8B1A1A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.icon{width:80px;height:80px;background:#C9A96E;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;margin:0 auto 16px;}
h1{font-size:22px;margin:0 0 8px;}
p{font-size:14px;opacity:0.9;margin:8px 0;line-height:1.6;}
.btn{display:inline-block;background:#C9A96E;color:#fff;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:bold;text-decoration:none;margin-top:20px;}
.steps{text-align:left;background:rgba(255,255,255,0.1);border-radius:12px;padding:16px 20px;margin:20px 0;max-width:340px;width:100%;}
.steps div{margin:10px 0;font-size:14px;line-height:1.6;}
.num{display:inline-block;width:22px;height:22px;background:#C9A96E;border-radius:50%;text-align:center;line-height:22px;font-size:12px;font-weight:bold;margin-right:8px;}
</style>
</head>
<body>
<div class="icon">讲</div>
<h1>讲话助手</h1>
<p>黄主任专属 · 会议发言智能生成</p>

<div class="steps">
<div><span class="num">1</span>点击下方按钮打开讲话助手</div>
<div><span class="num">2</span>页面加载后，点浏览器底部<b>三横线菜单</b></div>
<div><span class="num">3</span>找到「<b>添加到主屏幕</b>」或「<b>发送到桌面</b>」</div>
<div><span class="num">4</span>点击确认，桌面就出现图标了</div>
</div>

<a class="btn" href="https://huangang888.github.io/speech-app">打开讲话助手</a>

<p style="margin-top:24px;font-size:12px;opacity:0.6;">也可以让微信里的朋友发这个链接给你<br>在微信里打开后用浏览器跳转即可</p>
</body>
</html>
